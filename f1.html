<style>
:root {
    --bg-primary: #111;
    --bg-secondary: #1a1a1a;
    --bg-card: #222;
    --bg-card-hover: #2a2a2a;
    --text-primary: #fff;
    --text-secondary: #aaa;
    --text-muted: #666;
    --accent: #e10600;
    --accent-hover: #ff1a14;
    --border: #333;
    --skeleton: #2a2a2a;
    --skeleton-shine: #333;
    --shadow: rgba(0,0,0,0.3);
    --tab-bg: #1a1a1a;
    --tab-active: #e10600;
    --past-opacity: 0.45;
    --next-glow: 0 0 20px rgba(225,6,0,0.3);
}
[data-theme="light"] {
    --bg-primary: #f5f5f5;
    --bg-secondary: #fff;
    --bg-card: #fff;
    --bg-card-hover: #f0f0f0;
    --text-primary: #111;
    --text-secondary: #555;
    --text-muted: #999;
    --accent: #e10600;
    --accent-hover: #c00500;
    --border: #ddd;
    --skeleton: #e0e0e0;
    --skeleton-shine: #f0f0f0;
    --shadow: rgba(0,0,0,0.08);
    --tab-bg: #eee;
    --tab-active: #e10600;
    --past-opacity: 0.4;
    --next-glow: 0 0 20px rgba(225,6,0,0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Hide scrollbars but keep scroll functionality */
.weather-days, .tab-nav, .data-table-wrap, .results-modal-content, .tabs-container {
    scrollbar-width: none;
    -ms-overflow-style: none;
}
.weather-days::-webkit-scrollbar, .tab-nav::-webkit-scrollbar, .data-table-wrap::-webkit-scrollbar,
.results-modal-content::-webkit-scrollbar, .tabs-container::-webkit-scrollbar { display: none; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }

/* Navbar */
.navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.5rem;
    background: var(--bg-secondary);
    border-bottom: 2px solid var(--accent);
    position: sticky; top: 0; z-index: 100;
}
.navbar-brand {
    font-size: 1.5rem; font-weight: 800; color: var(--accent);
    letter-spacing: -0.5px;
}
.navbar-brand:hover { color: var(--accent-hover); text-decoration: none; }
.navbar-controls { display: flex; align-items: center; gap: 0.75rem; }
.theme-toggle {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); padding: 0.4rem 0.65rem;
    border-radius: 8px; cursor: pointer; font-size: 1rem;
    transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--accent); }
.tz-select {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); padding: 0.4rem 0.5rem;
    border-radius: 8px; font-size: 0.8rem; font-family: inherit;
    max-width: 200px;
}

/* Container */
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

/* Season Progress */
.season-progress {
    margin-bottom: 1.5rem; text-align: center;
}
.season-progress-label {
    font-size: 0.85rem; color: var(--text-secondary);
    margin-bottom: 0.5rem; font-weight: 500;
}
.progress-track {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; flex-wrap: wrap; padding: 0.5rem 0;
}
.progress-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); transition: all 0.3s;
    position: relative;
}
.progress-dot.completed { background: var(--accent); }
.progress-dot.next {
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    transform: scale(1.3);
}
.progress-dot.future { background: var(--border); }

/* Hero */
.hero {
    text-align: center; padding: 2rem 0 1.5rem;
}
.hero-race-name {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900; line-height: 1.1;
    margin-bottom: 0.5rem; letter-spacing: -1px;
}
.hero-circuit {
    font-size: 1.1rem; color: var(--text-secondary);
    margin-bottom: 0.25rem;
}
.hero-location {
    font-size: 0.95rem; color: var(--text-muted);
    margin-bottom: 1.5rem;
}
.countdown-label {
    font-size: 1rem; color: var(--text-secondary);
    margin-bottom: 0.25rem; font-weight: 500;
}
.countdown-timer {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800; color: var(--accent);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
}

/* Weekend Schedule */
.schedule-section { margin-bottom: 2rem; }
.schedule-section h2 {
    font-size: 1.1rem; font-weight: 700;
    margin-bottom: 0.75rem; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 1px;
}
.schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.75rem;
}
.session-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem; text-align: center;
    transition: all 0.3s;
}
.session-card.past { opacity: var(--past-opacity); }
.session-card.next {
    border-color: var(--accent);
    box-shadow: var(--next-glow);
}
.session-card .session-name {
    font-weight: 700; font-size: 0.85rem;
    text-transform: uppercase; margin-bottom: 0.25rem;
}
.session-card .session-date {
    font-size: 0.8rem; color: var(--text-secondary);
}
.session-card .session-time {
    font-size: 1rem; font-weight: 600;
}
.session-card .session-status {
    font-size: 0.75rem; margin-top: 0.25rem;
}
.session-card .session-status .done { color: #4caf50; }
.session-card .session-status .upcoming { color: var(--accent); }

/* Weather */
.weather-widget {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
    margin-bottom: 2rem; text-align: center;
}
.weather-widget h3 {
    font-size: 0.9rem; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 0.75rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.temp-toggle {
    background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--accent); font-size: 0.75rem; font-weight: 700;
    padding: 2px 8px; border-radius: 6px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.2s;
}
.temp-toggle:hover { background: var(--accent); color: #fff; }
.weather-days {
    display: flex; gap: 0.75rem; overflow-x: auto;
    padding: 0 0.5rem 0.5rem; justify-content: center;
    flex-wrap: wrap;
}
.weather-day {
    min-width: 80px; text-align: center;
    flex-shrink: 0;
}
.weather-day .wd-label {
    font-size: 0.7rem; color: var(--text-muted);
    text-transform: uppercase; font-weight: 600;
}
.weather-day .wd-date {
    font-size: 0.65rem; color: var(--text-muted);
    margin-bottom: 0.15rem;
}
.weather-day .wd-icon { font-size: 1.5rem; margin: 0.25rem 0; }
.weather-day .wd-temp { font-size: 0.85rem; font-weight: 600; }
.weather-day .wd-rain {
    font-size: 0.7rem; color: var(--text-muted);
}

/* Calendar Export */
.cal-export {
    text-align: center; margin-bottom: 2rem;
}
.cal-export-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent); color: #fff;
    border: none; padding: 0.6rem 1.25rem;
    border-radius: 8px; font-family: inherit;
    font-weight: 600; font-size: 0.9rem;
    cursor: pointer; transition: background 0.2s;
}
.cal-export-btn:hover { background: var(--accent-hover); }

/* Tabs */
.tabs-container { margin-bottom: 2rem; }
.tab-nav-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.4rem;
}
.tab-nav-arrow {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 0; height: 32px;
    min-width: 0;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 0.8rem;
    transition: width 0.25s, min-width 0.25s, opacity 0.25s, border-color 0.2s, color 0.2s;
    opacity: 0; pointer-events: none;
    flex-shrink: 0;
    overflow: hidden;
}
.tab-nav-arrow.visible { opacity: 1; pointer-events: auto; width: 32px; min-width: 32px; }
.tab-nav-arrow:hover { border-color: var(--accent); color: var(--accent); }
.tab-nav-arrow--right.visible { animation: tab-arrow-pulse 1.5s ease-in-out 3; }
@keyframes tab-arrow-pulse {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(3px); }
}
.tab-nav {
    display: flex; gap: 0; overflow-x: auto;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0;
    -webkit-overflow-scrolling: touch;
    flex: 1;
    min-width: 0;
}
.tab-btn {
    background: none; border: none;
    color: var(--text-secondary);
    padding: 0.75rem 1.25rem;
    font-family: inherit; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.2s;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active {
    color: var(--accent); border-bottom-color: var(--accent);
}
.tab-panel {
    display: none; padding: 1.25rem 0;
}
.tab-panel.active { display: block; }

/* Tables */
.data-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.data-table {
    width: 100%; border-collapse: collapse;
    font-size: 0.88rem;
}
.data-table th {
    text-align: left; padding: 0.65rem 0.75rem;
    border-bottom: 2px solid var(--border);
    color: var(--text-secondary); font-weight: 600;
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap;
    cursor: pointer; user-select: none;
}
.data-table th:hover { color: var(--text-primary); }
.data-table th .sort-icon { margin-left: 4px; font-size: 0.65rem; }
.data-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.data-table tr:hover td { background: var(--bg-card-hover); }
.data-table .past-race { opacity: var(--past-opacity); }
.data-table .next-race td { font-weight: 600; }
.data-table .next-race td:first-child {
    border-left: 3px solid var(--accent);
}

/* Points bar */
.points-bar-wrap {
    display: flex; align-items: center; gap: 0.5rem;
}
.points-bar {
    height: 8px; border-radius: 4px;
    min-width: 2px; transition: width 0.5s;
}
.points-value { font-weight: 600; min-width: 36px; }

/* Team color dot */
.team-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 6px; vertical-align: middle;
}

/* Fastest lap */
.fastest-lap { color: #a855f7; }

/* Loading skeleton */
.skeleton {
    background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
}
@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
.skeleton-line {
    height: 16px; margin-bottom: 10px; border-radius: 4px;
}
.skeleton-line.short { width: 60%; }
.skeleton-line.medium { width: 80%; }
.skeleton-line.full { width: 100%; }
.spinner {
    display: flex; justify-content: center; padding: 2rem;
}
.spinner::after {
    content: ''; width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile cards (for standings on small screens) */
.mobile-cards { display: none; }
.mobile-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem;
    margin-bottom: 0.6rem;
}
.mobile-card .mc-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.4rem; gap: 0.75rem;
}
.mobile-card .mc-pos {
    font-size: 1.2rem; font-weight: 800; color: var(--accent);
    min-width: 36px;
}
.mobile-card .mc-name { font-weight: 700; flex: 1; }
.mobile-card .mc-points { font-weight: 700; font-size: 1.1rem; }
.mobile-card .mc-detail {
    font-size: 0.8rem; color: var(--text-secondary);
}
.mobile-card .mc-bar {
    height: 6px; border-radius: 3px; margin-top: 0.5rem;
}

/* Track Layout */
.track-layout {
    margin: 1.5rem auto 0;
    max-width: 240px;
    opacity: 0;
    transition: opacity 0.5s ease;
    overflow: hidden;
}
.track-layout.loaded { opacity: 1; }
.track-layout .track-svg {
    max-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.track-layout svg {
    width: 100%;
    height: auto;
    max-height: 180px;
    display: block;
}
[data-theme="light"] .track-layout svg {
    filter: invert(1);
}
.track-layout-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 0.4rem;
    margin-bottom: 1.25rem;
    font-weight: 600;
}
.hero-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 0.35rem 0.85rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: all 0.2s;
}
.hero-back-btn:hover { background: var(--accent); color: #fff; }
/* Mini track in schedule */
.schedule-track {
    width: 48px;
    height: 32px;
    opacity: 0;
    transition: opacity 0.4s ease;
    flex-shrink: 0;
}
.schedule-track.loaded { opacity: 0.6; }
.schedule-track svg {
    width: 100%;
    height: 100%;
    display: block;
}
[data-theme="light"] .schedule-track svg { filter: invert(1); }
.schedule-track-td {
    width: 56px;
    padding-right: 0 !important;
}
.mc-track-wrap {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}
.mc-track-wrap .schedule-track {
    width: 44px;
    height: 30px;
}

/* Track Lightbox */
.track-lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    background: rgba(0,0,0,1);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
    animation: fadeIn 0.2s ease;
}
.track-lightbox.open { display: flex; }
.track-lightbox svg {
    width: min(80vw, 400px);
    height: auto;
    max-height: 50vh;
}
[data-theme="light"] .track-lightbox svg { filter: none; }
.track-lightbox-name {
    color: #fff;
    font-size: 1.3rem;
    font-weight: 800;
    margin-top: 1.25rem;
    letter-spacing: -0.5px;
}
.track-lightbox-details {
    color: rgba(255,255,255,0.6);
    font-size: 0.85rem;
    margin-top: 0.35rem;
    text-align: center;
    line-height: 1.5;
}
.track-lightbox-details i {
    margin-right: 4px;
    font-size: 0.75rem;
}
.track-lightbox-hint {
    color: rgba(255,255,255,0.3);
    font-size: 0.7rem;
    margin-top: 1rem;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
#scheduleTable tbody tr { cursor: pointer; }
#panel-schedule .mobile-card { cursor: pointer; }

/* Lightbox Arrow Navigation */
.lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 1.5rem;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 10000;
}
.lightbox-arrow:hover { background: rgba(255,255,255,0.3); }
.lightbox-arrow.left { left: 1.5rem; }
.lightbox-arrow.right { right: 1.5rem; }

/* Sprint Weekend Badge */
.sprint-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
}

/* Live Pulse */
.live-pulse {
    display: inline-block;
    background: #e10600;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 6px;
    animation: livePulse 1.5s ease-in-out infinite;
    letter-spacing: 1px;
}
@keyframes livePulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
}

/* Hero Race Navigation */
.hero-nav-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
}
.hero-nav-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: all 0.2s;
    flex-shrink: 0;
}
.hero-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.hero-nav-btn:disabled {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
}

/* Favorite Star */
.fav-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    transition: color 0.2s;
}
.fav-btn:hover { color: #fbbf24; }
.fav-btn.active { color: #fbbf24; }
.fav-filter-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
}
.fav-filter-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 0.35rem 0.85rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.fav-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.fav-filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
}

/* Reminder Bell */
.reminder-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
    vertical-align: middle;
}
.reminder-btn:hover { color: var(--accent); }
.reminder-btn.active { color: var(--accent); }

/* Results Modal */
.results-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9998;
    background: rgba(0,0,0,0.85);
    align-items: flex-start;
    justify-content: center;
    cursor: pointer;
    animation: fadeIn 0.2s ease;
    overflow-y: auto;
    padding: 2rem 1rem;
}
.results-modal.open { display: flex; }
.results-modal-content {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;

function getSvgUrl(circuitId) {
    const mapping = CIRCUIT_SVG_MAP[circuitId];
    if (!mapping) return null;
    return `https://raw.githubusercontent.com/julesr0y/f1-circuits-svg/main/circuits/minimal/white/${mapping.id}-${mapping.layout}.svg`;
}

async function fetchTrackSvg(circuitId) {
    if (svgCache[circuitId]) return svgCache[circuitId];
    const url = getSvgUrl(circuitId);
    if (!url) return null;
    try {
        const resp = await fetch(url);
        if (!resp.ok) return null;
        const text = await resp.text();
        svgCache[circuitId] = text;
        return text;
    } catch (e) { return null; }
}

function insertSvgInto(container, svgText) {
    if (!container || !svgText) return;
    container.innerHTML = svgText;
    const svg = container.querySelector('svg');
    if (svg) {
        if (!svg.getAttribute('viewBox')) {
            const w = svg.getAttribute('width') || 500;
            const h = svg.getAttribute('height') || 500;
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        }
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        // Crop viewBox to actual content bounding box
        const shapes = svg.querySelectorAll('path, circle, rect, polygon, polyline, line, ellipse');
        if (shapes.length) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            shapes.forEach(p => {
                const bb = p.getBBox();
                minX = Math.min(minX, bb.x);
                minY = Math.min(minY, bb.y);
                maxX = Math.max(maxX, bb.x + bb.width);
                maxY = Math.max(maxY, bb.y + bb.height);
            });
            const pad = 10;
            svg.setAttribute('viewBox', `${minX - pad} ${minY - pad} ${maxX - minX + pad * 2} ${maxY - minY + pad * 2}`);
        }
    }
}

let lightboxInfo = {};

function openTrackLightbox(circuitId, info) {
    const lb = document.getElementById('trackLightbox');
    const svgText = svgCache[circuitId];
    if (!svgText || !lb) return;
    lightboxInfo = info;
    const svgContainer = lb.querySelector('.track-lightbox-svg');
    lb.querySelector('.track-lightbox-name').textContent = info.race || '';
    let details = '';
    if (info.circuit) details += `<i class="fa-solid fa-flag-checkered"></i> ${info.circuit}<br>`;
    if (info.location) details += `<i class="fa-solid fa-location-dot"></i> ${info.location}<br>`;
    if (info.date) details += `<i class="fa-solid fa-calendar"></i> ${info.date}`;
    if (info.round) details = `<span style="color:var(--accent);font-weight:700">Round ${info.round}</span><br>` + details;
    lb.querySelector('.track-lightbox-details').innerHTML = details;
    const lbCircuitInfo = document.getElementById('lbCircuitInfo');
    if (lbCircuitInfo) lbCircuitInfo.innerHTML = getLightboxCircuitInfoHtml(circuitId);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(() => {
        insertSvgInto(svgContainer, svgText);
    });

    // Update lightbox current index and arrow visibility
    lightboxCurrentIndex = lightboxCircuitIds.indexOf(circuitId);
    updateLightboxArrows();
}

function updateLightboxArrows() {
    const leftBtn = document.getElementById('lbArrowLeft');
    const rightBtn = document.getElementById('lbArrowRight');
    if (!leftBtn || !rightBtn) return;

    const prevId = lightboxCurrentIndex > 0 ? lightboxCircuitIds[lightboxCurrentIndex - 1] : null;
    const nextId = lightboxCurrentIndex < lightboxCircuitIds.length - 1 ? lightboxCircuitIds[lightboxCurrentIndex + 1] : null;

    leftBtn.style.display = (prevId && svgCache[prevId]) ? '' : 'none';
    rightBtn.style.display = (nextId && svgCache[nextId]) ? '' : 'none';
}

function navigateLightbox(dir) {
    const newIdx = lightboxCurrentIndex + dir;
    if (newIdx < 0 || newIdx >= lightboxCircuitIds.length) return;
    const newCid = lightboxCircuitIds[newIdx];
    if (!svgCache[newCid]) return;

    // Find race info for this circuit
    const races = seasonData ? seasonData.MRData.RaceTable.Races : [];
    const race = races.find(r => r.Circuit.circuitId === newCid);
    if (race) {
        const dt = fmtDate(race.date, race.time);
        openTrackLightbox(newCid, {
            race: race.raceName,
            circuit: race.Circuit.circuitName,
            location: `${race.Circuit.Location.locality}, ${race.Circuit.Location.country}`,
            date: displayDate(dt),
            round: race.round
        });
    }
}

function closeTrackLightbox() {
    const lb = document.getElementById('trackLightbox');
    lb.classList.remove('open');
    document.body.style.overflow = '';
}

function initTrackLightbox() {
    const lb = document.getElementById('trackLightbox');
    lb.addEventListener('click', (e) => {
        // Don't close if clicking arrows or inner content
        if (e.target.closest('.lightbox-arrow')) return;
        closeTrackLightbox();
    });

    document.getElementById('lbArrowLeft').addEventListener('click', (e) => {
        e.stopPropagation();
        navigateLightbox(-1);
    });
    document.getElementById('lbArrowRight').addEventListener('click', (e) => {
        e.stopPropagation();
        navigateLightbox(1);
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closeTrackLightbox();
            closeResultsModal();
        }
        if (lb.classList.contains('open')) {
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        }
    });

    // Delegate clicks on schedule cards/rows or track thumbnails
    document.addEventListener('click', e => {
        // Check for fav button - don't open lightbox
        if (e.target.closest('.fav-btn')) return;

        // Find the track element or the card/row
        let track = e.target.closest('.schedule-track[data-circuit]');
        let card = null;
        if (!track) {
            card = e.target.closest('.mobile-card[data-round], #scheduleTable tbody tr[data-round]');
            if (card) track = card.querySelector('.schedule-track[data-circuit]');
        }
        if (!track && !card) return;

        // Check if this is a past race - open results modal instead
        const round = (card && card.dataset.round) || (track && track.dataset.round);
        const isPast = (card && card.dataset.past === 'true') || (track && track.closest('[data-past="true"]'));
        if (isPast && round) {
            openRaceResultsModal(round);
            return;
        }

        if (!track) return;
        const cid = track.dataset.circuit;
        if (svgCache[cid]) openTrackLightbox(cid, {
            race: track.dataset.race || '',
            circuit: track.dataset.name || '',
            location: track.dataset.location || '',
            date: track.dataset.date || '',
            round: track.dataset.round || ''
        });
    });
}

        }
    });
}

// ---- Cache ----
const cache = {};
const CACHE_TTL = 5 * 60 * 1000;

async function cachedFetch(url) {
    const now = Date.now();
    if (cache[url] && (now - cache[url].ts) < CACHE_TTL) {
        return cache[url].data;
    }
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    cache[url] = { data, ts: now };
    return data;
}

function initTheme() {
    const saved = localStorage.getItem('f1_theme');
    let theme;
    if (saved) {
        theme = saved;
    } else {
        // First visit: detect system preference
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
    updateThemeIcon(theme);

    // Listen for system theme changes (only applies if user hasn't manually set)
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('f1_theme')) {
            const newTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            updateThemeIcon(newTheme);
        }
    });
}
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('f1_theme', next);
    updateThemeIcon(next);
}
function updateThemeIcon(theme) {
    const icon = document.querySelector('#themeToggle i');

function fmtDate(isoDate, isoTime) {

    return DateTime.fromISO(str, { zone: 'UTC' });
}
function displayTime(dt) {

}

// ---- Team color lookup ----
function getTeamColor(name) {
    if (!name) return '#666';
    for (const [key, color] of Object.entries(TEAM_COLORS)) {
        if (name.includes(key) || key.includes(name)) return color;
    }
    // Fuzzy match
    const lower = name.toLowerCase();
    if (lower.includes('red bull') || lower.includes('redbull')) return TEAM_COLORS['Red Bull'];
    if (lower.includes('mclaren')) return TEAM_COLORS['McLaren'];
    if (lower.includes('ferrari')) return TEAM_COLORS['Ferrari'];
    if (lower.includes('mercedes')) return TEAM_COLORS['Mercedes'];
    if (lower.includes('aston')) return TEAM_COLORS['Aston Martin'];
    if (lower.includes('alpine')) return TEAM_COLORS['Alpine'];
    if (lower.includes('williams')) return TEAM_COLORS['Williams'];
    if (lower.includes('haas')) return TEAM_COLORS['Haas'];
    if (lower.includes('sauber') || lower.includes('kick')) return TEAM_COLORS['Kick Sauber'];
    if (lower.includes('rb') || lower.includes('racing bulls') || lower.includes('alphatauri') || lower.includes('visa')) return TEAM_COLORS['RB'];
    return '#666';
}

// ---- Build session list from race data ----
function getSessions(race) {
    const sessions = [];
    if (race.FirstPractice) {
        sessions.push({ name: 'FP1', date: race.FirstPractice.date, time: race.FirstPractice.time });
    }
    if (race.SecondPractice) {
        sessions.push({ name: 'FP2', date: race.SecondPractice.date, time: race.SecondPractice.time });
    }
    if (race.ThirdPractice) {
        sessions.push({ name: 'FP3', date: race.ThirdPractice.date, time: race.ThirdPractice.time });
    }
    if (race.Sprint) {
        // Sprint weekend: insert sprint shootout if ThirdPractice is missing
        if (!race.ThirdPractice && race.Qualifying) {
            // On sprint weekends the API sometimes puts Sprint Qualifying in a special field
        }
        sessions.push({ name: 'Sprint', date: race.Sprint.date, time: race.Sprint.time });
    }
    if (race.Qualifying) {
        sessions.push({ name: 'Qualifying', date: race.Qualifying.date, time: race.Qualifying.time });
    }
    sessions.push({ name: 'Race', date: race.date, time: race.time });

    // Sort by datetime
    sessions.sort((a, b) => {
        const da = fmtDate(a.date, a.time);
        const db = fmtDate(b.date, b.time);
        return da.toMillis() - db.toMillis();
    });
    return sessions;
}

function getNextSession(sessions) {
    const now = DateTime.utc();
    for (const s of sessions) {
        const dt = fmtDate(s.date, s.time);
        if (dt > now) return s;
    }
    return null;
}

            <div class="track-layout-label"><i class="fa-solid fa-road"></i> Circuit Layout</div>
        </div>
        ${getCircuitInfoHtml(race.Circuit.circuitId)}
        <div id="countdownWrap">
            ${isCurrentRace ? (nextSession ? `
                <div class="countdown-label" id="countdownLabel">${escHtml(nextSession.name)} starts in
                    <button class="reminder-btn ${reminderActive ? 'active' : ''}" id="reminderBtn" onclick="toggleReminder()" title="Set 15-min reminder">
                        <i class="fa-solid ${reminderActive ? 'fa-bell' : 'fa-bell-slash'}"></i>
                    </button>
                </div>
                <div class="countdown-timer" id="countdownTimer">--:--:--</div>
            ` : `<div class="countdown-label">Race weekend complete</div>`) : `
                <div class="countdown-label" style="margin-top:0.25rem"><i class="fa-solid fa-calendar"></i> ${displayDate(fmtDate(race.date, race.time))}</div>
            `}
        </div>
    `;

    if (countdownInterval) clearInterval(countdownInterval);
    if (isCurrentRace && nextSession) {
        startCountdown(sessions);
    }
}

function startCountdown(sessions) {
    function tick() {
        const now = DateTime.utc();

        // Check if currently DURING a session (live detection)
        for (const s of sessions) {
            const dt = fmtDate(s.date, s.time);
            const duration = SESSION_DURATIONS[s.name] || 1;
            const end = dt.plus({ hours: duration });
            if (now >= dt && now <= end) {
                const labelEl = document.getElementById('countdownLabel');
                const timerEl = document.getElementById('countdownTimer');
                if (!labelEl || !timerEl) return;
                labelEl.innerHTML = `<span class="live-pulse">LIVE</span> ${escHtml(s.name)}`;
                timerEl.textContent = '';
                return;
            }
        }

        let nextSession = null;
        for (const s of sessions) {
            const dt = fmtDate(s.date, s.time);
            if (dt > now) { nextSession = s; break; }
        }
        const labelEl = document.getElementById('countdownLabel');
        const timerEl = document.getElementById('countdownTimer');
        if (!labelEl || !timerEl) return;

        if (!nextSession) {
            labelEl.textContent = 'Race weekend complete';
            timerEl.textContent = '';
            if (countdownInterval) clearInterval(countdownInterval);
            return;
        }

        const dt = fmtDate(nextSession.date, nextSession.time);
        const diff = dt.diff(now, ['days', 'hours', 'minutes', 'seconds']);
        const d = Math.floor(diff.days);
        const h = Math.floor(diff.hours);
        const m = Math.floor(diff.minutes);
        const s = Math.floor(diff.seconds);

        labelEl.textContent = `${nextSession.name} starts in`;
        let parts = [];
        if (d > 0) parts.push(`${d}d`);
        parts.push(`${String(h).padStart(2,'0')}h`);
        parts.push(`${String(m).padStart(2,'0')}m`);
        parts.push(`${String(s).padStart(2,'0')}s`);
        timerEl.textContent = parts.join(' ');
    }
    tick();
    countdownInterval = setInterval(tick, 1000);
}

// ---- Season Progress ----
function renderSeasonProgress(races, nextRound) {
    const el = document.getElementById('seasonProgress');
    const total = races.length;
    const now = DateTime.utc();
    let completedCount = 0;
    races.forEach(r => {
        const dt = fmtDate(r.date, r.time);
        if (dt <= now) completedCount++;
    });

    const nextNum = nextRound ? parseInt(nextRound) : completedCount + 1;
    el.innerHTML = `
        <div class="season-progress-label">Race ${nextNum} of ${total}</div>
        <div class="progress-track">
            ${races.map((r, i) => {
                const dt = fmtDate(r.date, r.time);
                const isPast = dt <= now;
                const isNext = parseInt(r.round) === nextNum;
                let cls = 'progress-dot';
                if (isPast) cls += ' completed';
                else if (isNext) cls += ' next';
                else cls += ' future';
                return `<div class="${cls}" title="R${r.round}: ${escHtml(r.raceName)}"></div>`;
            }).join('')}
        </div>
    `;
}

// ---- Session Reminder Notifications ----
window.toggleReminder = function() {
    const active = localStorage.getItem('f1_reminder') === 'true';
    if (active) {
        // Cancel
        localStorage.removeItem('f1_reminder');
        if (reminderTimeout) { clearTimeout(reminderTimeout); reminderTimeout = null; }
        const btn = document.getElementById('reminderBtn');
        if (btn) { btn.classList.remove('active'); btn.querySelector('i').className = 'fa-solid fa-bell-slash'; }
    } else {
        // Request permission and set
        if ('Notification' in window) {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    localStorage.setItem('f1_reminder', 'true');
                    const btn = document.getElementById('reminderBtn');
                    if (btn) { btn.classList.add('active'); btn.querySelector('i').className = 'fa-solid fa-bell'; }
                    scheduleReminder();
                }
            });
        }
    }
};

function scheduleReminder() {
    if (!nextRaceData) return;
    const sessions = getSessions(nextRaceData);
    const nextSession = getNextSession(sessions);
    if (!nextSession) return;

    const dt = fmtDate(nextSession.date, nextSession.time);
    const reminderTime = dt.minus({ minutes: 15 });
    const now = DateTime.utc();
    const msUntil = reminderTime.toMillis() - now.toMillis();

    if (msUntil > 0) {
        if (reminderTimeout) clearTimeout(reminderTimeout);
        reminderTimeout = setTimeout(() => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('F1 Session Starting Soon', {
                    body: `${nextSession.name} - ${nextRaceData.raceName} starts in 15 minutes!`,
                    icon: 'crying-sunglasses-cowboy.png'
                });
            }
            localStorage.removeItem('f1_reminder');
        }, msUntil);
    }
}

async function loadWeather(race) {
    const widget = document.getElementById('weatherWidget');
    try {
        const lat = race.Circuit.Location.lat;
        const lon = race.Circuit.Location.long || race.Circuit.Location.lng;
        if (!lat || !lon) return;

        // Determine race weekend date range (FP1 through Race day)
        const sessions = getSessions(race);
        if (!sessions.length) return;
        const firstSessionDate = sessions[0].date;
        const lastSessionDate = race.date;

        // Try race weekend specific dates first
        let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=auto&start_date=${firstSessionDate}&end_date=${lastSessionDate}`;
        let data;
        try {
            data = await cachedFetch(url);
        } catch (e) {
            data = null;
        }

        if (!data || !data.daily || !data.daily.time || !data.daily.time.length) {
            // Race is too far out for forecast — use climate API for historical averages
            url = `https://climate-api.open-meteo.com/v1/climate?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&start_date=${firstSessionDate}&end_date=${lastSessionDate}&models=EC_Earth3P_HR`;
            try {
                data = await cachedFetch(url);
            } catch (e) { data = null; }
            if (!data || !data.daily || !data.daily.time || !data.daily.time.length) {
                weatherCache = null;
                widget.style.display = 'none';
                return;
            }
            // Normalize climate data to match forecast format
            const daily = data.daily;
            // Derive approximate weather codes from precipitation data
            daily.weathercode = daily.precipitation_sum
                ? daily.precipitation_sum.map(mm => mm > 5 ? 61 : mm > 1 ? 51 : mm > 0 ? 3 : 0)
                : daily.time.map(() => 0);
            daily.precipitation_probability_max = daily.precipitation_sum
                ? daily.precipitation_sum.map(mm => mm > 5 ? 80 : mm > 1 ? 50 : mm > 0 ? 20 : 5)
                : daily.time.map(() => null);
            weatherCache = daily;
            weatherIsForecast = true;
        } else {
            weatherCache = data.daily;
            weatherIsForecast = false;
        }

        renderWeather();
    } catch (e) {
        weatherCache = null;
        widget.style.display = 'none';
    }
}

// ---- Calendar Export (.ics) ----
function setupCalendarExport(race) {
    const wrap = document.getElementById('calExport');
    const btn = document.getElementById('calExportBtn');
    wrap.style.display = '';
    btn.onclick = () => downloadICS(race);
}

function downloadICS(race) {
    const sessions = getSessions(race);
    const events = sessions.map(s => {
        const dt = fmtDate(s.date, s.time);
        const end = dt.plus({ hours: s.name === 'Race' ? 2 : 1 });
        const uid = `f1-${race.season}-${race.round}-${s.name.replace(/\s/g,'')}@f1.wtf`;
        return `BEGIN:VEVENT
DTSTART:${icsDate(dt)}
DTEND:${icsDate(end)}
SUMMARY:F1 ${race.raceName} - ${s.name}
LOCATION:${race.Circuit.circuitName}, ${race.Circuit.Location.locality}, ${race.Circuit.Location.country}
DESCRIPTION:${race.raceName} - ${s.name} at ${race.Circuit.circuitName}
UID:${uid}
END:VEVENT`;
    });

    const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//f1.wtf//F1 Calendar//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
X-WR-CALNAME:F1 ${race.raceName}
${events.join('\n')}
END:VCALENDAR`;

    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `F1-${race.raceName.replace(/[^a-zA-Z0-9]/g, '-')}.ics`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function icsDate(dt) {
    return dt.toUTC().toFormat("yyyyMMdd'T'HHmmss'Z'");
}

// ---- Tab Nav Scroll Arrows ----
function updateTabArrows() {
    const nav = document.querySelector('.tab-nav');
    if (!nav) return;
    const leftArr = document.querySelector('.tab-nav-arrow--left');
    const rightArr = document.querySelector('.tab-nav-arrow--right');
    if (!leftArr || !rightArr) return;
    const { scrollLeft, scrollWidth, clientWidth } = nav;
    leftArr.classList.toggle('visible', scrollLeft > 4);
    rightArr.classList.toggle('visible', scrollLeft + clientWidth < scrollWidth - 4);
}

window.scrollTabs = function(dir) {
    const nav = document.querySelector('.tab-nav');
    if (!nav) return;
    const amount = nav.clientWidth * 0.6;
    if (dir < 0 && nav.scrollLeft <= amount + 20) {
        nav.scrollTo({ left: 0, behavior: 'smooth' });
    } else if (dir > 0 && nav.scrollLeft + nav.clientWidth + amount >= nav.scrollWidth - 20) {
        nav.scrollTo({ left: nav.scrollWidth, behavior: 'smooth' });
    } else {
        nav.scrollBy({ left: dir * amount, behavior: 'smooth' });
    }
};

// ---- Tabs ----
function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

async function loadTab(tab) {

// ---- Season Schedule Tab ----
async function renderSeasonSchedule(panel) {
    const data = seasonData || await cachedFetch(API.season);
    const races = data.MRData.RaceTable.Races;
    const now = DateTime.utc();
    let nextRound = null;
    for (const r of races) {
        const dt = fmtDate(r.date, r.time);
        if (dt > now) { nextRound = r.round; break; }
    }

    let sortCol = null, sortDir = 1;

    function render() {
        let filtered = [...races];
        if (showOnlyFavorites) {
            filtered = filtered.filter(r => favorites.includes(r.round));
        }
        const sorted = [...filtered];
        if (sortCol !== null) {
            sorted.sort((a, b) => {
                let va, vb;
                switch (sortCol) {
                    case 0: va = parseInt(a.round); vb = parseInt(b.round); break;
                    case 1: va = a.raceName; vb = b.raceName; break;
                    case 2: va = a.Circuit.circuitName; vb = b.Circuit.circuitName; break;
                    case 3: va = a.date; vb = b.date; break;
                    case 4: va = a.time || ''; vb = b.time || ''; break;
                    default: va = 0; vb = 0;
                }
                if (typeof va === 'string') return sortDir * va.localeCompare(vb);
                return sortDir * (va - vb);
            });
        }

        const sprintBadge = (r) => r.Sprint ? '<span class="sprint-badge">SPRINT</span>' : '';
        const favIcon = (r) => {
            const isFav = favorites.includes(r.round);
            return `<button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.round}')" title="Toggle favorite"><i class="fa-${isFav ? 'solid' : 'regular'} fa-star"></i></button>`;
        };

        panel.innerHTML = `
            <div class="fav-filter-bar">
                <button class="fav-filter-btn ${showOnlyFavorites ? 'active' : ''}" onclick="toggleFavFilter()"><i class="fa-solid fa-star"></i> Favorites</button>
            </div>
            <div class="data-table-wrap desktop-table">
                <table class="data-table" id="scheduleTable">
                    <thead><tr>
                        <th></th>
                        <th data-col="0">Rd ${sortIcon(0)}</th>
                        <th data-col="1">Race ${sortIcon(1)}</th>
                        <th data-col="2">Circuit ${sortIcon(2)}</th>
                        <th data-col="3">Date ${sortIcon(3)}</th>
                        <th data-col="4">Time ${sortIcon(4)}</th>
                        <th></th>
                    </tr></thead>
                    <tbody>
                        ${sorted.map(r => {
                            const dt = fmtDate(r.date, r.time);
                            const isPast = dt <= now;
                            const isNext = r.round === nextRound;
                            let cls = '';
                            if (isPast) cls = 'past-race';
                            else if (isNext) cls = 'next-race';
                            return `<tr class="${cls}" data-round="${r.round}" data-past="${isPast}">

// ---- Driver Standings Tab (with Championship Math) ----
async function renderDriverStandings(panel) {
    const data = await cachedFetch(API.driverStandings);
    const standings = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;
    const maxPts = parseFloat(standings[0].points) || 1;

    // Championship math: calculate remaining points
    let remainingRaces = 0;
    let remainingSprints = 0;
    if (seasonData) {
        const races = seasonData.MRData.RaceTable.Races;
        const now = DateTime.utc();
        races.forEach(r => {
            const dt = fmtDate(r.date, r.time);
            if (dt > now) {
                remainingRaces++;
                if (r.Sprint) remainingSprints++;
            }
        });
    }
    const maxRemainingPts = (remainingRaces * 26) + (remainingSprints * 8);
    const leaderPts = parseFloat(standings[0].points);

    function isEliminated(driverPts) {
        return maxRemainingPts > 0 && (leaderPts - driverPts) > maxRemainingPts;
    }

    function clinchPoints() {
        if (standings.length < 2) return null;
        const secondPts = parseFloat(standings[1].points);
        const needed = maxRemainingPts - (leaderPts - secondPts);
        if (needed <= 0) return 0; // Already clinched
        return needed;
    }

    let sortCol = null, sortDir = 1;

    function render() {
        const sorted = [...standings];
        if (sortCol !== null) {
            sorted.sort((a, b) => {
                let va, vb;
                switch (sortCol) {
                    case 0: va = parseInt(a.position); vb = parseInt(b.position); break;
                    case 1: va = a.Driver.familyName; vb = b.Driver.familyName; break;
                    case 2: va = a.Constructors[0]?.name || ''; vb = b.Constructors[0]?.name || ''; break;
                    case 3: va = parseFloat(a.points); vb = parseFloat(b.points); break;
                    case 4: va = parseInt(a.wins); vb = parseInt(b.wins); break;
                    default: va = 0; vb = 0;
                }
                if (typeof va === 'string') return sortDir * va.localeCompare(vb);
                return sortDir * (va - vb);
            });
        }

        const clinch = clinchPoints();
        let clinchHtml = '';
        if (maxRemainingPts > 0) {
            if (clinch === 0) {
                clinchHtml = `<div class="clinch-info"><i class="fa-solid fa-trophy"></i> ${escHtml(standings[0].Driver.givenName)} ${escHtml(standings[0].Driver.familyName)} has clinched the championship!</div>`;
            } else if (clinch !== null && clinch <= maxRemainingPts) {
                clinchHtml = `<div class="clinch-info"><i class="fa-solid fa-calculator"></i> ${escHtml(standings[0].Driver.familyName)} can clinch with ${clinch} more points &middot; ${remainingRaces} races remaining (max ${maxRemainingPts} pts available)</div>`;
            }
        }

        const elimBadge = (pts) => {
            if (parseInt(standings[0].position) === 1 && isEliminated(parseFloat(pts))) {
                return '<span class="elim-badge">Eliminated</span>';
            }
            return '';
        };

        panel.innerHTML = `
            ${clinchHtml}
            <div class="data-table-wrap desktop-table">
                <table class="data-table" id="driverStTable">
                    <thead><tr>
                        <th data-col="0">Pos ${dsIcon(0)}</th>
                        <th data-col="1">Driver ${dsIcon(1)}</th>
                        <th data-col="2">Team ${dsIcon(2)}</th>
                        <th data-col="3">Points ${dsIcon(3)}</th>
                        <th data-col="4">Wins ${dsIcon(4)}</th>
                        <th>Gap</th>
                    </tr></thead>
                    <tbody>
                        ${sorted.map(d => {
                            const team = d.Constructors[0]?.name || '';
                            const color = getTeamColor(team);
                            const pts = parseFloat(d.points);
                            const pct = (pts / maxPts) * 100;
                            const gap = maxPts - pts;
                            return `<tr>
                                <td>${d.position}</td>
                                <td>${escHtml(d.Driver.givenName)} ${escHtml(d.Driver.familyName)}${elimBadge(d.points)}</td>
                                <td><span class="team-dot" style="background:${color}"></span>${escHtml(team)}</td>
                                <td><strong>${d.points}</strong></td>
                                <td>${d.wins}</td>
                                <td><div class="points-bar-wrap"><div class="points-bar" style="width:${pct}%;background:${color}"></div><span style="font-size:0.75rem;color:var(--text-muted)">${gap > 0 ? '-' + gap : 'Leader'}</span></div></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
            <div class="mobile-cards">
                ${sorted.map(d => {
                    const team = d.Constructors[0]?.name || '';
                    const color = getTeamColor(team);
                    const pts = parseFloat(d.points);
                    const pct = (pts / maxPts) * 100;
                    return `<div class="mobile-card">
                        <div class="mc-header">
                            <span class="mc-pos">${d.position}</span>
                            <span class="mc-name">${escHtml(d.Driver.givenName)} ${escHtml(d.Driver.familyName)}${elimBadge(d.points)}</span>
                            <span class="mc-points">${d.points}</span>
                        </div>
                        <div class="mc-detail"><span class="team-dot" style="background:${color}"></span>${escHtml(team)} &middot; ${d.wins} wins</div>
                        <div class="mc-bar" style="width:${pct}%;background:${color}"></div>
                    </div>`;
                }).join('')}
            </div>
        `;

        panel.querySelectorAll('#driverStTable th[data-col]').forEach(th => {
            th.addEventListener('click', () => {
                const col = parseInt(th.dataset.col);
                if (sortCol === col) sortDir *= -1;
                else { sortCol = col; sortDir = 1; }
                render();
            });
        });
    }

    function dsIcon(col) {
        if (sortCol !== col) return '<span class="sort-icon"><i class="fa-solid fa-sort"></i></span>';
        return sortDir === 1
            ? '<span class="sort-icon"><i class="fa-solid fa-sort-up"></i></span>'
            : '<span class="sort-icon"><i class="fa-solid fa-sort-down"></i></span>';
    }

    render();
}

// ---- H2H Compare & Teammate Battle Tab ----
async function renderH2HTab(panel) {
    panel.innerHTML = '<div class="spinner"></div>';

    try {
        const [standingsData, allResultsData, allQualiData] = await Promise.all([
            cachedFetch(API.driverStandings),
            cachedFetch(API.allResults),
            cachedFetch(API.allQualifying)
        ]);

        const standings = standingsData.MRData.StandingsTable.StandingsLists[0].DriverStandings;
        const allRaces = allResultsData.MRData.RaceTable.Races || [];
        const allQuali = allQualiData.MRData.RaceTable.Races || [];

        // Build driver list for dropdowns
        const driverList = standings.map(d => ({
            id: d.Driver.driverId,
            name: `${d.Driver.givenName} ${d.Driver.familyName}`,
            team: d.Constructors[0]?.name || '',
            points: parseFloat(d.points),
            wins: parseInt(d.wins)
        }));

        // Compute stats for each driver from allRaces
        const driverStats = {};
        driverList.forEach(d => {
            driverStats[d.id] = { points: d.points, wins: d.wins, podiums: 0, finishes: [], dnfs: 0 };
        });
        allRaces.forEach(race => {
            (race.Results || []).forEach(r => {
                const did = r.Driver.driverId;
                if (!driverStats[did]) return;
                const pos = parseInt(r.position);
                if (pos <= 3) driverStats[did].podiums++;
                if (r.status === 'Finished' || r.status.startsWith('+')) {
                    driverStats[did].finishes.push(pos);
                } else {
                    driverStats[did].dnfs++;
                    driverStats[did].finishes.push(null);
                }
            });
        });

        // Qualifying H2H between two drivers
        function qualiH2H(d1, d2) {
            let w1 = 0, w2 = 0;
            allQuali.forEach(race => {
                const qr = race.QualifyingResults || [];
                const q1 = qr.find(q => q.Driver.driverId === d1);
                const q2 = qr.find(q => q.Driver.driverId === d2);
                if (q1 && q2) {
                    if (parseInt(q1.position) < parseInt(q2.position)) w1++;
                    else if (parseInt(q2.position) < parseInt(q1.position)) w2++;
                }
            });
            return [w1, w2];
        }

        // Race H2H
        function raceH2H(d1, d2) {
            let w1 = 0, w2 = 0;
            allRaces.forEach(race => {
                const results = race.Results || [];
                const r1 = results.find(r => r.Driver.driverId === d1);
                const r2 = results.find(r => r.Driver.driverId === d2);
                if (r1 && r2) {
                    if (parseInt(r1.position) < parseInt(r2.position)) w1++;
                    else if (parseInt(r2.position) < parseInt(r1.position)) w2++;
                }
            });
            return [w1, w2];
        }

        // Teammate detection
        const teamDrivers = {};
        standings.forEach(d => {
            const team = d.Constructors[0]?.name || '';
            if (!teamDrivers[team]) teamDrivers[team] = [];
            teamDrivers[team].push({
                id: d.Driver.driverId,
                name: `${d.Driver.givenName} ${d.Driver.familyName}`,
                points: parseFloat(d.points)
            });
        });

        function renderComparison(d1Id, d2Id) {
            const s1 = driverStats[d1Id];
            const s2 = driverStats[d2Id];
            const d1 = driverList.find(d => d.id === d1Id);
            const d2 = driverList.find(d => d.id === d2Id);
            if (!s1 || !s2 || !d1 || !d2) return '<div class="error-msg">Select two different drivers to compare.</div>';

            const avgFinish1 = s1.finishes.filter(Boolean).length > 0 ? (s1.finishes.filter(Boolean).reduce((a,b) => a+b, 0) / s1.finishes.filter(Boolean).length).toFixed(1) : '-';
            const avgFinish2 = s2.finishes.filter(Boolean).length > 0 ? (s2.finishes.filter(Boolean).reduce((a,b) => a+b, 0) / s2.finishes.filter(Boolean).length).toFixed(1) : '-';

            const [qh1, qh2] = qualiH2H(d1Id, d2Id);
            const [rh1, rh2] = raceH2H(d1Id, d2Id);

            const c1 = getTeamColor(d1.team);
            const c2 = getTeamColor(d2.team);

// ---- Qualifying Gaps Visualizer (Feature 2) ----
async function renderQualifyingGaps(panel) {
    panel.innerHTML = '<div class="spinner"></div>';
    try {
        // Determine which round to show - use last completed race or current
        const races = seasonData ? seasonData.MRData.RaceTable.Races : [];
        const now = DateTime.utc();
        let completedRounds = [];
        races.forEach(r => {
            const dt = fmtDate(r.date, r.time);
            if (dt <= now) completedRounds.push(r);
        });

        if (completedRounds.length === 0) {
            panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-clock"></i>No qualifying data available yet this season.</div>';
            return;
        }

        function buildRoundSelector(selectedRound) {
            return `<select class="round-select" id="qualiRoundSelect" onchange="window.changeQualiRound(this.value)">
                ${completedRounds.map(r => `<option value="${r.round}" ${r.round === selectedRound ? 'selected' : ''}>Round ${r.round}: ${escHtml(r.raceName)}</option>`).join('')}
            </select>`;
        }

        async function loadRound(round) {
            const url = `https://api.jolpi.ca/ergast/f1/current/${round}/qualifying/?format=json`;
            let data;
            try { data = await cachedFetch(url); } catch(e) { data = null; }

            if (!data || !data.MRData.RaceTable.Races.length || !data.MRData.RaceTable.Races[0].QualifyingResults) {
                panel.innerHTML = buildRoundSelector(round) + '<div class="error-msg"><i class="fa-solid fa-clock"></i>No qualifying data available for this round.</div>';
                return;
            }

            const race = data.MRData.RaceTable.Races[0];
            const results = race.QualifyingResults;

            // Get pole time
            const poleResult = results[0];
            const poleTimeStr = poleResult.Q3 || poleResult.Q2 || poleResult.Q1;
            const poleTime = parseTimeToSeconds(poleTimeStr);

            // Build gap data
            const gaps = results.map(r => {
                const bestTime = r.Q3 || r.Q2 || r.Q1;
                const timeSeconds = parseTimeToSeconds(bestTime);
                const gap = poleTime ? (timeSeconds - poleTime) : 0;
                const constructorId = r.Constructor ? r.Constructor.constructorId : '';
                return {
                    driver: `${r.Driver.code || r.Driver.familyName.substring(0,3).toUpperCase()}`,
                    fullName: `${r.Driver.givenName} ${r.Driver.familyName}`,
                    gap: gap,
                    timeStr: bestTime || '-',
                    team: r.Constructor ? r.Constructor.name : '',
                    teamColor: r.Constructor ? getTeamColor(r.Constructor.name) : '#666',
                    position: parseInt(r.position)
                };
            }).filter(g => g.gap >= 0);

            const maxGap = Math.max(...gaps.map(g => g.gap), 0.001);

            panel.innerHTML = `
                ${buildRoundSelector(round)}
                <div class="bar-chart-section-title"><i class="fa-solid fa-stopwatch"></i> Qualifying Gaps to Pole - ${escHtml(race.raceName)}</div>
                <div class="bar-chart-subtitle">Gap to P1: ${escHtml(poleResult.Driver.givenName)} ${escHtml(poleResult.Driver.familyName)} (${escHtml(poleTimeStr || '-')})</div>
                <div class="bar-chart-container">
                    ${gaps.map(g => {
                        const pct = g.gap === 0 ? 100 : Math.max(2, ((maxGap - g.gap) / maxGap) * 100);
                        const barPct = g.gap === 0 ? 100 : Math.min(100, Math.max(3, (g.gap / maxGap) * 100));
                        return `<div class="bar-chart-row">
                            <span class="bar-chart-label" title="${escHtml(g.fullName)}">${escHtml(g.driver)}</span>
                            <div class="bar-chart-bar-wrap">
                                <div class="bar-chart-bar" style="width:${barPct}%;background:${g.teamColor}"></div>
                            </div>
                            <span class="bar-chart-value">${g.gap === 0 ? 'POLE' : '+' + g.gap.toFixed(3) + 's'}</span>
                        </div>`;
                    }).join('')}
                </div>
            `;
        }

        window.changeQualiRound = function(round) {
            tabLoaded['qualifying'] = false;
            loadRound(round);
        };

        const lastRound = completedRounds[completedRounds.length - 1].round;
        await loadRound(lastRound);

    } catch(e) {
        panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i>Failed to load qualifying data.</div>';
    }
}

function parseTimeToSeconds(timeStr) {
    if (!timeStr) return Infinity;
    // Format: "1:23.456" or "1:23:456"
    const parts = timeStr.split(':');
    if (parts.length === 2) {
        return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
    }
    if (parts.length === 1) {
        return parseFloat(parts[0]);
    }
    return Infinity;
}

// ---- Pit Stop Stats (Feature 3) ----
async function renderPitStopStats(panel) {
    panel.innerHTML = '<div class="spinner"></div>';
    try {
        const races = seasonData ? seasonData.MRData.RaceTable.Races : [];
        const now = DateTime.utc();
        let completedRounds = [];
        races.forEach(r => {
            const dt = fmtDate(r.date, r.time);
            if (dt <= now) completedRounds.push(r);
        });

        if (completedRounds.length === 0) {
            panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-clock"></i>No pit stop data available yet this season.</div>';
            return;
        }

        // Fetch pit stops for all completed races
        const pitStopPromises = completedRounds.map(r =>
            cachedFetch(`https://api.jolpi.ca/ergast/f1/current/${r.round}/pitstops/?format=json&limit=100`).catch(() => null)
        );
        const pitStopResults = await Promise.all(pitStopPromises);

        // Also need driver standings for team mapping
        const standingsData = await cachedFetch(API.driverStandings);
        const standings = standingsData.MRData.StandingsTable.StandingsLists[0].DriverStandings;
        const driverTeamMap = {};
        standings.forEach(s => {
            driverTeamMap[s.Driver.driverId] = s.Constructors[0]?.name || '';
        });

        // Aggregate pit stops by team
        const teamStops = {};
        pitStopResults.forEach(data => {
            if (!data || !data.MRData.RaceTable.Races.length) return;
            const race = data.MRData.RaceTable.Races[0];
            const stops = race.PitStops || [];
            stops.forEach(stop => {
                const duration = parseFloat(stop.duration);
                if (isNaN(duration) || duration <= 0 || duration > 60) return; // Filter bad data
                const team = driverTeamMap[stop.driverId] || 'Unknown';
                if (!teamStops[team]) teamStops[team] = { total: 0, count: 0, stops: [] };
                teamStops[team].total += duration;
                teamStops[team].count++;
                teamStops[team].stops.push(duration);
            });
        });

        // Calculate averages and sort
        const teamAvgs = Object.entries(teamStops).map(([team, data]) => ({
            team,
            avg: data.total / data.count,
            count: data.count,
            fastest: Math.min(...data.stops),
            color: getTeamColor(team)
        })).sort((a, b) => a.avg - b.avg);

        if (teamAvgs.length === 0) {
            panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-clock"></i>No pit stop data available yet.</div>';
            return;
        }

        const fastest = teamAvgs[0].avg;
        const slowest = teamAvgs[teamAvgs.length - 1].avg;
        const range = slowest - fastest || 1;

        // Calculate overall stats
        const allStops = Object.values(teamStops).flatMap(t => t.stops);
        const overallFastest = Math.min(...allStops);
        const overallSlowest = Math.max(...allStops);
        // Find who had the fastest and slowest stops
        let fastestTeam = '', slowestTeam = '';
        pitStopResults.forEach(data => {
            if (!data || !data.MRData.RaceTable.Races.length) return;
            (data.MRData.RaceTable.Races[0].PitStops || []).forEach(stop => {
                const dur = parseFloat(stop.duration);
                if (dur === overallFastest) fastestTeam = driverTeamMap[stop.driverId] || '';
                if (dur === overallSlowest) slowestTeam = driverTeamMap[stop.driverId] || '';
            });
        });

        panel.innerHTML = `
            <div class="bar-chart-section-title"><i class="fa-solid fa-gauge-high"></i> Pit Lane Times — ${new Date().getFullYear()} Season</div>
            <div class="bar-chart-subtitle">${completedRounds.length} races completed &middot; ${allStops.length} total pit stops &middot; Pit entry to exit</div>
            <div class="pitstop-summary">
                <div class="pitstop-stat">
                    <div class="pitstop-stat-value" style="color:var(--accent)">${overallFastest.toFixed(2)}s</div>
                    <div class="pitstop-stat-label">Fastest</div>
                    ${fastestTeam ? `<div class="pitstop-stat-sub">${escHtml(fastestTeam)}</div>` : ''}
                </div>
                <div class="pitstop-stat">
                    <div class="pitstop-stat-value">${overallSlowest.toFixed(2)}s</div>
                    <div class="pitstop-stat-label">Slowest</div>
                    ${slowestTeam ? `<div class="pitstop-stat-sub">${escHtml(slowestTeam)}</div>` : ''}
                </div>
            </div>
            <div style="margin-top:1.5rem;margin-bottom:0.5rem;font-size:0.85rem;font-weight:600;color:var(--text-secondary)">Average by Team</div>
            <div class="bar-chart-container">
                ${teamAvgs.map(t => {
                    const barPct = Math.max(5, 100 - ((t.avg - fastest) / range) * 70);
                    return `<div class="bar-chart-row">
                        <span class="bar-chart-label" style="min-width:70px" title="${escHtml(t.team)}">${escHtml(t.team.length > 8 ? t.team.substring(0,8) + '.' : t.team)}</span>
                        <div class="bar-chart-bar-wrap">
                            <div class="bar-chart-bar" style="width:${barPct}%;background:${t.color}"></div>
                        </div>
                        <span class="bar-chart-value">${t.avg.toFixed(2)}s (${t.count})</span>
                    </div>`;
                }).join('')}
            </div>
            <div style="margin-top:1rem;font-size:0.8rem;color:var(--text-muted)">
                <i class="fa-solid fa-info-circle"></i> Numbers in parentheses show total pit stops sampled.
            </div>
        `;
    } catch(e) {
        panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i>Failed to load pit stop data.</div>';
    }
}

// ---- Race Pace Comparison (Feature 4) ----
async function renderRacePace(panel) {
    panel.innerHTML = '<div class="spinner"></div>';
    try {
        const races = seasonData ? seasonData.MRData.RaceTable.Races : [];
        const now = DateTime.utc();
        let completedRounds = [];
        races.forEach(r => {
            const dt = fmtDate(r.date, r.time);
            if (dt <= now) completedRounds.push(r);
        });

        if (completedRounds.length === 0) {
            panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-clock"></i>No race data available yet this season.</div>';
            return;
        }

        function buildRoundSelector(selectedRound) {
            return `<select class="round-select" id="paceRoundSelect" onchange="window.changePaceRound(this.value)">
                ${completedRounds.map(r => `<option value="${r.round}" ${r.round === selectedRound ? 'selected' : ''}>Round ${r.round}: ${escHtml(r.raceName)}</option>`).join('')}
            </select>`;
        }

        async function loadRound(round) {
            const lapUrl = `https://api.jolpi.ca/ergast/f1/current/${round}/laps/?format=json&limit=2000`;
            const resultUrl = API.raceResults(round);

            let [lapData, resultData] = await Promise.all([
                cachedFetch(lapUrl).catch(() => null),
                cachedFetch(resultUrl).catch(() => null)
            ]);

            if (!lapData || !lapData.MRData.RaceTable.Races.length) {
                panel.innerHTML = buildRoundSelector(round) + '<div class="error-msg"><i class="fa-solid fa-clock"></i>No lap data available for this round.</div>';
                return;
            }

            const race = lapData.MRData.RaceTable.Races[0];
            const laps = race.Laps || [];

            // Build results map for team info
            const driverInfo = {};
            if (resultData && resultData.MRData.RaceTable.Races.length) {
                const results = resultData.MRData.RaceTable.Races[0].Results || [];
                results.forEach(r => {
                    driverInfo[r.Driver.driverId] = {
                        name: `${r.Driver.givenName} ${r.Driver.familyName}`,
                        code: r.Driver.code || r.Driver.familyName.substring(0,3).toUpperCase(),
                        team: r.Constructor ? r.Constructor.name : '',
                        color: r.Constructor ? getTeamColor(r.Constructor.name) : '#666',
                        laps: parseInt(r.laps) || 0,
                        status: r.status
                    };
                });
            }

            // Collect lap times per driver
            const driverLaps = {};
            laps.forEach(lap => {
                const lapNum = parseInt(lap.number);
                (lap.Timings || []).forEach(t => {
                    const did = t.driverId;
                    if (!driverLaps[did]) driverLaps[did] = [];
                    driverLaps[did].push({ lap: lapNum, time: parseTimeToSeconds(t.time) });
                });
            });

            // Calculate average pace excluding lap 1 and outliers (pit laps)
            const driverPaces = [];
            for (const [did, lapTimes] of Object.entries(driverLaps)) {
                // Skip lap 1
                const filtered = lapTimes.filter(l => l.lap > 1 && l.time < Infinity);
                if (filtered.length < 3) continue;

                // Remove outliers (> median + 10s, likely pit/safety car laps)
                const sorted = [...filtered].sort((a, b) => a.time - b.time);
                const median = sorted[Math.floor(sorted.length / 2)].time;
                const cleanLaps = filtered.filter(l => l.time < median + 10);

                if (cleanLaps.length < 3) continue;
                const avg = cleanLaps.reduce((s, l) => s + l.time, 0) / cleanLaps.length;

                const info = driverInfo[did] || { name: did, code: did.substring(0,3).toUpperCase(), team: '', color: '#666' };
                driverPaces.push({
                    driverId: did,
                    code: info.code,
                    name: info.name,
                    team: info.team,
                    color: info.color,
                    avgPace: avg,
                    lapCount: cleanLaps.length
                });
            }

            driverPaces.sort((a, b) => a.avgPace - b.avgPace);

            if (driverPaces.length === 0) {
                panel.innerHTML = buildRoundSelector(round) + '<div class="error-msg"><i class="fa-solid fa-clock"></i>No usable lap data for pace analysis.</div>';
                return;
            }

            const fastestPace = driverPaces[0].avgPace;
            const maxGap = driverPaces[driverPaces.length - 1].avgPace - fastestPace || 1;

            function formatLapTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = (seconds % 60).toFixed(3);
                return `${m}:${s.padStart(6, '0')}`;
            }

            const raceName = resultData && resultData.MRData.RaceTable.Races.length ? resultData.MRData.RaceTable.Races[0].raceName : `Round ${round}`;

            panel.innerHTML = `
                ${buildRoundSelector(round)}
                <div class="bar-chart-section-title"><i class="fa-solid fa-chart-line"></i> Average Race Pace - ${escHtml(raceName)}</div>
                <div class="bar-chart-subtitle">Excluding lap 1 and pit/outlier laps &middot; Fastest pace: ${formatLapTime(fastestPace)}</div>
                <div class="bar-chart-container">
                    ${driverPaces.map(d => {
                        const gap = d.avgPace - fastestPace;
                        const barPct = gap === 0 ? 100 : Math.min(100, Math.max(3, (gap / maxGap) * 100));
                        return `<div class="bar-chart-row">
                            <span class="bar-chart-label" title="${escHtml(d.name)}">${escHtml(d.code)}</span>
                            <div class="bar-chart-bar-wrap">
                                <div class="bar-chart-bar" style="width:${barPct}%;background:${d.color}"></div>
                            </div>
                            <span class="bar-chart-value">${gap === 0 ? formatLapTime(d.avgPace) : '+' + gap.toFixed(3) + 's'}</span>
                        </div>`;
                    }).join('')}
                </div>
            `;
        }

        window.changePaceRound = function(round) {
            tabLoaded['racepace'] = false;
            loadRound(round);
        };

        const lastRound = completedRounds[completedRounds.length - 1].round;
        await loadRound(lastRound);

    } catch(e) {
        panel.innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i>Failed to load race pace data.</div>';
    }
}

    if (!penalties || penalties.length === 0) {
        panel.innerHTML = `
            <div class="bar-chart-section-title"><i class="fa-solid fa-gavel"></i> Driver Penalty Tracker - 2026 Season</div>
            <div class="bar-chart-subtitle">Penalty points, grid penalties, and time penalties</div>
            <div class="penalty-empty">
                <i class="fa-solid fa-circle-check"></i>
                No penalty data recorded yet for the 2026 season.<br>
                <span style="font-size:0.8rem;color:var(--text-muted)">This tracker will be updated as penalties are issued throughout the season.</span>
            </div>
        `;
        return;
    }

    // Sort by most penalty points
    const sorted = [...penalties].sort((a, b) => b.penaltyPoints - a.penaltyPoints);

    panel.innerHTML = `
        <div class="bar-chart-section-title"><i class="fa-solid fa-gavel"></i> Driver Penalty Tracker - 2026 Season</div>
        <div class="bar-chart-subtitle">12 penalty points within 12 months = 1 race ban &middot; 8+ points = danger zone</div>
        <div class="penalty-grid">
            ${sorted.map(d => {
                const pct = (d.penaltyPoints / 12) * 100;
                const isDanger = d.penaltyPoints >= 8;
                const isCritical = d.penaltyPoints >= 10;
                const meterColor = isCritical ? '#ef4444' : isDanger ? '#f59e0b' : 'var(--accent)';
                const badgeClass = isCritical ? 'critical' : isDanger ? 'warning' : '';
                const color = getTeamColor(d.team);
                return `<div class="penalty-card ${isDanger ? 'danger-zone' : ''}" style="border-left:3px solid ${color}">
                    <div class="penalty-header">
                        <span class="penalty-driver">${escHtml(d.driver)}</span>
                        <span class="penalty-points-badge ${badgeClass}">${d.penaltyPoints}/12 pts</span>
                    </div>
                    <div class="penalty-meter">
                        <div class="penalty-meter-fill" style="width:${pct}%;background:${meterColor}"></div>
                    </div>
                    <div class="penalty-detail">
                        <span><i class="fa-solid fa-flag"></i> ${d.gridPenalties || 0} grid penalties</span>
                        <span><i class="fa-solid fa-clock"></i> ${d.timePenalties || 0} time penalties</span>
                    </div>
                    ${d.incidents && d.incidents.length ? `<div style="margin-top:0.5rem;font-size:0.72rem;color:var(--text-muted)">
                        ${d.incidents.map(inc => `<div style="margin-top:0.2rem"><i class="fa-solid fa-caret-right" style="color:var(--accent)"></i> ${escHtml(inc.race)}: ${escHtml(inc.description)} (${inc.points}pt${inc.points !== 1 ? 's' : ''}${inc.penalty ? ', ' + escHtml(inc.penalty) : ''})</div>`).join('')}
                    </div>` : ''}
                </div>`;
            }).join('')}
        </div>
    `;
}

// ---- Utility ----
function escHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ---- Init ----
async function init() {
    initTheme();
    initTimezone();
    initTabs();
    initTrackLightbox();
    initResultsModal();

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // Load next race + season in parallel
    try {
        const [nextData, sznData] = await Promise.all([
            cachedFetch(API.next),
            cachedFetch(API.season)
        ]);

        const race = nextData.MRData.RaceTable.Races[0];
        seasonData = sznData;
        const races = sznData.MRData.RaceTable.Races;

        // Build lightbox circuit ID list from season order
        lightboxCircuitIds = races.map(r => r.Circuit.circuitId);

        if (race) {
            nextRaceData = race;
            // Find the index of the current race in season
            currentHeroRaceIndex = races.findIndex(r => r.round === race.round);
            originalRaceIndex = currentHeroRaceIndex;
            renderHero(race);
            loadTrackLayout(race.Circuit.circuitId);
            renderSchedule(race);
            renderSeasonProgress(races, race.round);
            loadWeather(race);
            setupCalendarExport(race);

            // Set up reminder if previously enabled
            if (localStorage.getItem('f1_reminder') === 'true') {
                scheduleReminder();
            }
        } else {
            document.getElementById('hero').innerHTML = '<div class="error-msg"><i class="fa-solid fa-flag-checkered"></i>No upcoming race found.</div>';
            renderSeasonProgress(races, null);
        }
    } catch (e) {
        document.getElementById('hero').innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i>Failed to load race data. Please refresh.</div>';
    }

    // Auto-load first tab
    loadTab('schedule');
}

init();

})();
</script>
</body>
</html>
