/* ========== NEON THEME ========== */

/* ========== RETRO THEME ========== */
[data-theme="retro"]{

    --glow:none;--shake:none;--font-style:normal;--pixel:normal;
    --radius:0;--shadow:4px 4px 0 #000;
}
[data-theme="retro"] *{image-rendering:pixelated}
[data-theme="retro"] .main-btn{text-transform:uppercase;letter-spacing:3px;border:3px solid #ffd460}
[data-theme="retro"] h1{font-family:"Courier New",monospace;letter-spacing:4px;text-transform:uppercase}
[data-theme="retro"] .gif-frame{border:4px solid #e94560}

/* ========== CLEAN THEME ========== */
[data-theme="clean"]{
    --font:'Inter',-apple-system,system-ui,sans-serif;

    --text:#222;--text2:#888;--accent:#333;--accent2:#666;
    --border:#ddd;--card:#fff;--card-hover:#f8f8f8;
    --btn-bg:#222;--btn-text:#fff;--btn-hover:#444;
    --glow:none;--shake:none;--font-style:normal;--pixel:normal;
    --radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
[data-theme="clean"] .gif-frame{border:1px solid #ddd}

/* ========== RAGE THEME ========== */
[data-theme="rage"]{
    --font:'Impact','Arial Black',sans-serif;
    --bg:#1a0000;--bg2:#2a0000;--bg3:#3a0000;

    --border:#4a0000;--card:#200000;--card-hover:#300000;

    --font-style:italic;--pixel:normal;
    --radius:4px;--shadow:0 0 20px rgba(255,0,0,0.3);
}
[data-theme="rage"] .main-btn{animation:var(--shake);text-transform:uppercase;letter-spacing:2px}
[data-theme="rage"] .main-btn:hover{animation:shake 0.05s infinite}
[data-theme="rage"] h1{text-shadow:0 0 10px rgba(255,0,0,0.8);font-style:italic}
[data-theme="rage"] .gif-frame{border:3px solid #ff0000;box-shadow:0 0 20px rgba(255,0,0,0.3)}

.sidebar{width:320px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.3s}
.sidebar.closed{transform:translateX(100%);width:0;border:none}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:bold;font-size:14px}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
.sidebar-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;border:none;background:none;color:var(--text2);font-family:var(--font);transition:all 0.2s}
.sidebar-tab.active{color:var(--accent);border-bottom:2px solid var(--accent);font-weight:bold}
.sidebar-tab:hover{color:var(--text)}
.sidebar-content{flex:1;overflow-y:auto;padding:8px}
.sidebar-item{display:flex;gap:8px;padding:8px;border-radius:var(--radius);cursor:pointer;align-items:center;border:1px solid transparent;transition:all 0.2s;margin-bottom:4px}
.sidebar-item:hover{background:var(--card-hover);border-color:var(--border)}
.sidebar-item img{width:60px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0}
.sidebar-item .item-info{flex:1;overflow:hidden}
.sidebar-item .item-desc{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .item-id{font-size:10px;color:var(--text2)}

.sidebar-item:hover .item-actions{opacity:1}

.sidebar-item .item-action:hover{color:var(--accent);background:var(--bg3)}
.sidebar-empty{padding:40px 20px;text-align:center;color:var(--text2);font-size:13px}
.sidebar-footer{padding:8px 12px;border-top:1px solid var(--border)}

.sidebar-footer button:hover{border-color:var(--accent);color:var(--accent)}
.stats-panel{padding:16px}
.stat-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text2)}
.stat-value{font-weight:bold;color:var(--accent)}
.stat-section{margin-top:16px}
.stat-section h3{font-size:13px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.stat-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px}
.stat-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.3s}

h1{font-size:clamp(28px,5vw,42px);font-weight:900;letter-spacing:-1px;margin-bottom:4px}
h1 span{color:var(--accent)}
.subtitle{color:var(--text2);font-size:13px;font-style:var(--font-style)}

/* ========== TOOLBAR ========== */

.tool-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:5px;transition:all 0.2s;white-space:nowrap}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}
.tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-btn i{font-size:12px}
.theme-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;font-family:var(--font);cursor:pointer;outline:none}

.gif-desc{margin-top:12px;font-size:14px;color:var(--text2);text-align:center;min-height:20px;font-style:var(--font-style)}

/* ========== ACTION BUTTONS ========== */
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.action-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s}
.action-btn:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.1)}
.action-btn.fav-active{color:#ffd700;border-color:#ffd700}
.action-btn .tooltip-text{display:none}
.copied-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:bold;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}

.counter{margin-top:16px;text-align:center;width:100%;max-width:400px}
.counter-text{font-size:12px;color:var(--text2);margin-bottom:4px}
.counter-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.counter-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s ease-out}

/* ========== CELEBRATION ========== */
.celebrate-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden}
.celebrate-particle{position:absolute;top:-40px;font-size:28px;animation:confettiFall linear forwards;pointer-events:none}

}
</style>

/* ==============================================
   STATE
   ============================================== */
let current = null;
let history = [];
let historyIndex = -1;
let seen = new Set();
let favs = [];
let autoplay = false;
let autoplayTimer = null;
let sidebarTab = 'favs';

/* ==============================================
   INIT
   ============================================== */
function init() {
    // Restore state
    try { favs = JSON.parse(localStorage.getItem('gf_favs')) || []; } catch(e) { favs = []; }
    try { const s = JSON.parse(localStorage.getItem('gf_seen')); if (s) seen = new Set(s); } catch(e) {}
    try { history = JSON.parse(localStorage.getItem('gf_history')) || []; historyIndex = history.length - 1; } catch(e) { history = []; }
    const savedTheme = localStorage.getItem('gf_theme') || 'dark';
    setTheme(savedTheme);
    updateFavCount();
    updateCounter();

    // Check for shared gif in URL hash
    const hash = window.location.hash;
    if (hash && hash.startsWith('#gif=')) {
        const gifId = parseInt(hash.slice(5));
        const gif = GIFS.find(g => g.id === gifId);
        if (gif) { showGif(gif); return; }
    }
}

/* ==============================================
   THEME
   ============================================== */
function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-select').value = t;
    localStorage.setItem('gf_theme', t);
}

/* ==============================================
   GET RANDOM GIF
   ============================================== */
function getRandomGif() {
    if (GIFS.length === 0) return;
    localStorage.setItem('gf_clicks', (parseInt(localStorage.getItem('gf_clicks')||'0')+1).toString());
    let unseen = GIFS.filter(g => !seen.has(g.id));
    if (unseen.length === 0) {
        // All seen — reset and start fresh
        seen.clear();
        localStorage.setItem('gf_seen', JSON.stringify([]));
        updateCounter();
        showToast('seen them all! reshuffling...');
        unseen = GIFS;
    }
    const gif = unseen[Math.floor(Math.random() * unseen.length)];
    showGif(gif);
}

function showGif(gif) {
    current = gif;
    seen.add(gif.id);
    localStorage.setItem('gf_seen', JSON.stringify([...seen]));

    // Add to history
    if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
    }
    history.push(gif);
    if (history.length > 500) history = history.slice(-500);
    historyIndex = history.length - 1;
    localStorage.setItem('gf_history', JSON.stringify(history));

    // Update UI
    const frame = document.getElementById('gif-frame');
    frame.innerHTML = `<img src="${gif.url}" alt="${gif.desc}" onerror="this.src='gifs/${gif.id}.gif'"><div class="autoplay-bar" id="autoplay-bar"></div>`;
    document.getElementById('gif-desc').textContent = gif.desc;
    document.getElementById('actions').style.display = 'flex';
    document.getElementById('counter').style.display = 'block';
    updateFavBtn();
    updateCounter();
    if (sidebarTab === 'history') renderSidebar();

    // Autoplay bar
    if (autoplay) startAutoplayBar();

    // Update URL hash for sharing
    window.history.replaceState(null, '', '#gif=' + gif.id);
}

function prevGif() {
    if (historyIndex > 0) {
        historyIndex--;
        const gif = history[historyIndex];
        current = gif;
        const frame = document.getElementById('gif-frame');
        frame.innerHTML = `<img src="${gif.url}" alt="${gif.desc}" onerror="this.src='gifs/${gif.id}.gif'"><div class="autoplay-bar" id="autoplay-bar"></div>`;
        document.getElementById('gif-desc').textContent = gif.desc;
        updateFavBtn();
        window.history.replaceState(null, '', '#gif=' + gif.id);
    }
}

function nextGif() {
    if (historyIndex < history.length - 1) {
        historyIndex++;
        const gif = history[historyIndex];
        current = gif;
        const frame = document.getElementById('gif-frame');
        frame.innerHTML = `<img src="${gif.url}" alt="${gif.desc}" onerror="this.src='gifs/${gif.id}.gif'"><div class="autoplay-bar" id="autoplay-bar"></div>`;
        document.getElementById('gif-desc').textContent = gif.desc;
        updateFavBtn();
        window.history.replaceState(null, '', '#gif=' + gif.id);
    } else {
        getRandomGif();
    }
}

/* ==============================================
   FAVORITES
   ============================================== */
function toggleFav() {
    if (!current) return;
    const idx = favs.findIndex(f => f.id === current.id);
    if (idx >= 0) favs.splice(idx, 1);
    else favs.push({id: current.id, url: current.url, desc: current.desc});
    localStorage.setItem('gf_favs', JSON.stringify(favs));
    updateFavBtn();
    updateFavCount();
    if (sidebarTab === 'favs') renderSidebar();
}

function isFav(id) { return favs.some(f => f.id === id); }

function updateFavBtn() {
    const btn = document.getElementById('fav-btn');
    if (!btn || !current) return;
    btn.classList.toggle('fav-active', isFav(current.id));
}

function updateFavCount() {
    document.getElementById('fav-count').textContent = favs.length;
    const badge = document.getElementById('fav-badge');
    if (favs.length > 0) { badge.style.display = 'flex'; badge.textContent = favs.length; }
    else badge.style.display = 'none';
}

function removeFav(id) {
    favs = favs.filter(f => f.id !== id);
    localStorage.setItem('gf_favs', JSON.stringify(favs));
    updateFavBtn();
    updateFavCount();
    renderSidebar();
}

/* ==============================================
   COUNTER
   ============================================== */
function updateCounter() {
    document.getElementById('seen-count').textContent = seen.size;
    document.getElementById('total-count').textContent = GIFS.length;
    const pct = (seen.size / GIFS.length * 100).toFixed(1);
    document.getElementById('counter-fill').style.width = pct + '%';
    if (seen.size === GIFS.length && !window._celebrated) {
        window._celebrated = true;
        document.getElementById('subtitle').textContent = "you've seen every single one. you absolute legend.";
        celebrate();
    }
}

function celebrate() {
    const emojis = ['🖕','🖕','🖕','🎉','🔥','💀','👏','🖕','🤘','💅'];
    const overlay = document.createElement('div');
    overlay.className = 'celebrate-overlay';
    document.body.appendChild(overlay);

    // Spawn particles in waves
    let spawned = 0;
    const spawnWave = () => {
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'celebrate-particle';
            p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left = (Math.random() * 100) + 'vw';
            p.style.fontSize = (20 + Math.random() * 24) + 'px';
            p.style.animationDuration = (2 + Math.random() * 3) + 's';
            p.style.animationDelay = (Math.random() * 0.5) + 's';
            overlay.appendChild(p);
        }
        spawned++;
        if (spawned < 4) setTimeout(spawnWave, 800);
    };
    spawnWave();

    // Banner
    const banner = document.createElement('div');
    banner.className = 'celebrate-banner';
    const clicks = localStorage.getItem('gf_clicks') || '?';
    banner.innerHTML = `
        <h2>🖕 you did it 🖕</h2>
        <p>you've seen all ${GIFS.length} gifs in ${clicks} clicks.<br>you absolute fucking legend.</p>
        <button onclick="this.parentElement.remove()">hell yeah</button>
    `;
    document.body.appendChild(banner);

    // Clean up particles after animation
    setTimeout(() => overlay.remove(), 6000);
}

/* ==============================================
   COPY & SHARE
   ============================================== */
function copyLink() {
    if (!current) return;
    const url = window.location.origin + window.location.pathname + '#gif=' + current.id;
    navigator.clipboard.writeText(url).then(() => showToast('link copied'));
}

function downloadGif() {
    if (!current) return;
    const a = document.createElement('a');
    a.href = current.url;
    a.download = current.desc.replace(/[^a-z0-9]/gi, '_') + '.gif';
    a.target = '_blank';
    a.click();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
}

/* ==============================================
   AUTOPLAY
   ============================================== */
function toggleAutoplay() {
    autoplay = !autoplay;
    const btn = document.getElementById('autoplay-btn');
    btn.classList.toggle('active', autoplay);
    btn.innerHTML = autoplay ? '<i class="fa-solid fa-pause"></i> Auto' : '<i class="fa-solid fa-play"></i> Auto';
    if (autoplay) {
        if (!current) getRandomGif();
        else startAutoplayBar();
    } else {
        clearTimeout(autoplayTimer);
        const bar = document.getElementById('autoplay-bar');
        if (bar) bar.style.width = '0';
    }
}

function startAutoplayBar() {
    clearTimeout(autoplayTimer);
    const bar = document.getElementById('autoplay-bar');
    if (bar) {
        bar.style.transition = 'none';
        bar.style.width = '0';
        requestAnimationFrame(() => {
            bar.style.transition = 'width 4s linear';
            bar.style.width = '100%';
        });
    }
    autoplayTimer = setTimeout(() => { if (autoplay) getRandomGif(); }, 4000);
}

/* ==============================================
   SIDEBAR
   ============================================== */
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('closed');
    renderSidebar();
}

function switchTab(tab, el) {
    sidebarTab = tab;
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const titles = {favs:'Favorites',history:'History',stats:'Stats'};
    document.getElementById('sidebar-title').textContent = titles[tab];
    renderSidebar();
}

function renderSidebar() {
    const c = document.getElementById('sidebar-content');

    if (sidebarTab === 'stats') {
        const clicks = parseInt(localStorage.getItem('gf_clicks') || '0');
        const pct = (seen.size / GIFS.length * 100).toFixed(1);
        const uniqueHist = new Set(history.map(g=>g.id));
        // Find most viewed gif
        const viewCounts = {};
        history.forEach(g => { viewCounts[g.id] = (viewCounts[g.id]||0)+1; });
        const topEntries = Object.entries(viewCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
        const topHtml = topEntries.map(([id,count]) => {
            const g = GIFS.find(x=>x.id===parseInt(id));
            return g ? `<div class="sidebar-item" onclick="showGif(GIFS.find(x=>x.id===${g.id}))"><img src="${g.url}" alt="" onerror="this.src='gifs/${g.id}.gif'"><div class="item-info"><div class="item-desc">${g.desc}</div><div class="item-id">${count} view${count>1?'s':''}</div></div></div>` : '';
        }).join('');
        c.innerHTML = `<div class="stats-panel">
            <div class="stat-row"><span class="stat-label">total clicks</span><span class="stat-value">${clicks}</span></div>
            <div class="stat-row"><span class="stat-label">unique gifs seen</span><span class="stat-value">${seen.size} / ${GIFS.length}</span></div>
            <div class="stat-row"><span class="stat-label">completion</span><span class="stat-value">${pct}%</span></div>
            <div style="margin-top:4px"><div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%"></div></div></div>
            <div class="stat-row"><span class="stat-label">favorites</span><span class="stat-value">${favs.length}</span></div>
            <div class="stat-row"><span class="stat-label">history entries</span><span class="stat-value">${history.length}</span></div>
            <div class="stat-row"><span class="stat-label">unique in history</span><span class="stat-value">${uniqueHist.size}</span></div>
            ${topEntries.length ? `<div class="stat-section"><h3>most viewed</h3>${topHtml}</div>` : ''}
        </div>`;
        return;
    }

    const items = sidebarTab === 'favs' ? favs : [...history].reverse();
    if (items.length === 0) {
        c.innerHTML = `<div class="sidebar-empty"><i class="fa-solid fa-${sidebarTab==='favs'?'star':'clock-rotate-left'}" style="font-size:32px;margin-bottom:12px;display:block;opacity:0.3"></i>${sidebarTab==='favs'?'no favorites yet. click the star on a gif to save it.':'no history yet. start clicking!'}</div>`;
        return;
    }
    let html = items.map(g => {
        const esc = g.desc.replace(/'/g,"\\'");
        const gifRef = `GIFS.find(x=>x.id===${g.id})||{id:${g.id},url:'${g.url}',desc:'${esc}'}`;
        return `<div class="sidebar-item" onclick="showGif(${gifRef})"><img src="${g.url}" alt="" onerror="this.src='gifs/${g.id}.gif'"><div class="item-info"><div class="item-desc">${g.desc}</div><div class="item-id">#${g.id}</div></div><div class="item-actions"><button class="item-action" onclick="event.stopPropagation();navigator.clipboard.writeText(location.origin+location.pathname+'#gif=${g.id}').then(()=>showToast('link copied'))" title="Copy Link"><i class="fa-solid fa-link"></i></button><button class="item-action" onclick="event.stopPropagation();(()=>{const a=document.createElement('a');a.href='${g.url}';a.download='${esc.replace(/[^a-z0-9]/gi,'_')}.gif';a.target='_blank';a.click()})()" title="Download"><i class="fa-solid fa-download"></i></button>${sidebarTab==='favs'?`<button class="item-action" onclick="event.stopPropagation();removeFav(${g.id})" title="Remove"><i class="fa-solid fa-xmark"></i></button>`:''}</div></div>`;
    }).join('');
    if (sidebarTab === 'history' && history.length > 0) {
        html += `<div class="sidebar-footer"><button onclick="clearHistory()"><i class="fa-solid fa-trash-can"></i> clear history</button></div>`;
    }
    c.innerHTML = html;
}

function clearHistory() {
    history = [];
    historyIndex = -1;
    localStorage.removeItem('gf_history');
    renderSidebar();
    showToast('history cleared');
}

/* ==============================================
   KEYBOARD SHORTCUTS
   ============================================== */
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); getRandomGif(); }
    else if (e.key === 'f') toggleFav();
    else if (e.key === 'c') copyLink();
    else if (e.key === 'ArrowLeft') prevGif();
    else if (e.key === 'ArrowRight') nextGif();
});

/* ==============================================
   START
   ============================================== */
init();
</script>
</body>
</html>
